<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lernkartei bearbeiten</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script type="module" src="../js/default-document-ready-stuff.js"></script>
    <script type="module" src="../js/011-edit-box.js"></script>
</head>
<body>
<div class="mx-auto col-lg-10 col-md-12" >
    <nav class="navbar navbar-expand-lg bg-info" id="insert-navbar-here"></nav>

    <div class="container" id="main">
        <form id="edit-box" class="needs-validation" novalidate>

            <div class="form-floating mb-3">
                <div class="d-flex align-items-stretch">
                    <div class="me-2">
                        <h1 class="mb-0">Kartei:</h1>
                    </div>

                    <div class="flex-grow-1 mb-2 ">
                        <input type="text" name="box-title" id="box-title" class="form-control h-100" required placeholder="Titel">
                        <div class="invalid-feedback">Bitte gib deiner neuen Kartei einen Namen.</div>
                    </div>
                </div>
            </div>

            <div class="row mb-2 mt-2">
                <div class="col-12">
                    <h2 id="author">erstellt von: </h2>
                </div>
            </div>

            <div class="form-floating mb-3">
                <textarea class="form-control" placeholder="Beschreibung" id="box-description" style="height: 12rem"></textarea>
            </div>

            <div class="form-check form-switch mb-3">
                <input class="form-check-input" type="checkbox" value="" name="is-public-box" id="is-public-box" role="switch">
                <label class="form-check-label" for="is-public-box">
                    Ich möchte diese Kartei mit anderen teilen.
                </label>
            </div>

            <div class="d-flex justify-content-between mx-1">
                <div>
                    <button id="update-box" type="submit" class="btn btn-primary me-1">Speichern</button>
                    <button id="delete-box" type="submit" class="btn btn-danger" >Löschen</button>

                </div>
                <button id="view-cards" type="submit" class="btn btn-outline-primary">Zu den Fragen</button>
            </div>


        </form>
    </div>

</div>

</body>
</html>
