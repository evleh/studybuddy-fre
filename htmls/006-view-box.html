<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kartei ansehen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <div class="mx-auto col-lg-10 col-md-12">
        <nav class="navbar navbar-expand-lg bg-info" id="insert-navbar-here"></nav>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h1 id="h1">Kartei ansehen</h1>
                <h5 id="author">erstellt von:</h5>
                <p id="description">
                    Description
                </p>
                <button id="view-cards" class="btn btn-outline-primary remove-when-logged-out" >zu den Karten</button>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>
                    Was sagst du dazu?
                </h5>
                <p>
                    Hier kannst du einen Kommentar zu dieser Lernkartei abgeben:
                </p>
                <form id="new-comment">
                    <div class="form-floating mb-3">
                        <textarea class="form-control needs-validation" placeholder="Dein Kommentar" id="comment" name="comment" style="height: 6rem"></textarea>
                        <label for="comment">Gib hier deinen Kommentar ein.</label>
                    </div>

                    <button id="new-comment-button" class="btn btn-primary">Kommentar erstellen</button>
                </form>

            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <h5>
                    Was sagen andere dazu?
                </h5>

                <div id="comment-list"></div>

            </div>
        </div>

    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    <script type="module" src="../js/default-document-ready-stuff.js"></script>
    <script type="module" src="../js/006-view-box.js"></script>
</body>
</html>
