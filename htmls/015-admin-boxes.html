<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Lernkarteien</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="mx-auto col-lg-10 col-md-12">
    <nav class="navbar navbar-expand-lg bg-info" id="insert-navbar-here"></nav>
    <div class="container mh-3">
        <div class="row">
            <div class="col-8">
                <h1>Lernkarteien moderieren</h1>
            </div>
            <div class="col-4 text-end">
                <a href="014-admin-home-base.html" class="btn btn-primary">zur Admin-Übersicht</a>
            </div>
            <!-- Force next columns to break to new line -->
            <div class="w-100"></div>
            <div class="col-8" id="generalTitle">
                <h3>Alle Kartei: </h3>
            </div>
            <div class="col-8" >
                <h3 id="questionsTitle">Fragen in der Kartei: </h3>
            </div>

            <div class="col-4 text-end">
                <a class="btn btn-primary" id="backToBoxes">zurück zu Karteien</a>
            </div>
        </div>

        <div class="input-group mb-3">
            <input type="text" class="form-control mt-3 shadow-sm " id="content-search" placeholder="Suchen ..."/>
        </div>

        <div id="admin-boxes-content">

            <div class="row row-cols-1 row-cols-md-2 g-3" id="list-of-all-boxes"></div>

            <div class="row row-cols-1 row-cols-md-2 g-3" id="list-of-questions"></div>

            <img class="img-w-margin" src="https://cdn.pixabay.com/photo/2024/05/01/06/40/cat-8731512_1280.jpg">
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<script type="module" src="../js/default-document-ready-stuff.js"></script>
<script type="module" src="../js/015-admin-boxes.js"></script>
</body>
</html>
